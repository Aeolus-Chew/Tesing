name: Autonomous Case AI Engine

# 1. Trigger the workflow when an issue is labeled
on:
  issues:
    types: [labeled]

jobs:
  launch-case-ai:
    # 2. Only run if the 'run-case' label is applied
    if: github.event.label.name == 'run-case'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun (Case Runtime)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Prepare Case Binary
        run: |
          git clone https://github.com/workos/case.git /tmp/case
          cd /tmp/case
          bun install
          bun run build:binary
          sudo cp dist/ca /usr/local/bin/ca

      - name: Execute Case Harness
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Executes Case against the issue that triggered the workflow
          ca ${{ github.event.issue.number }}
