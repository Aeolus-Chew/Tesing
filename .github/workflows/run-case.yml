name: Autonomous Case Engine Run

on:
  issues:
    types: [labeled]

jobs:
  execute-case-ai:
    if: github.event.label.name == 'run-case'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Layout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Runtime Environment (Bun)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build Case Framework Binary
        run: |
          git clone https://github.com/workos/case.git /tmp/case
          cd /tmp/case
          bun install
          bun run build:binary
          sudo cp dist/ca /usr/local/bin/ca

      - name: Run Case Against Issue Number
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ca ${{ github.event.issue.number }}
